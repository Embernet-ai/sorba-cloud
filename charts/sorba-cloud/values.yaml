# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud — EmberNET Bridge Chart Values
# ═══════════════════════════════════════════════════════════════════════
# This chart deploys the EmberNET bridge layer for SORBA Cloud.
# It does NOT deploy the actual SORBA Cloud platform — that's done
# separately via:
#
#   helm -n $TENANT upgrade $TENANT \
#     oci://sorbaregistry.azurecr.io/helm/sorba-cloud --version=1.3.0 \
#     -i --create-namespace -f values-sorba.yaml
#
# THIS chart adds a labeled pod + service for EmberNET dashboard
# discovery and iframe proxy integration.
# ═══════════════════════════════════════════════════════════════════════

imagePullSecrets:
  - name: ghcr-secret

# ── Service Configuration (EmberNET proxy target) ────────────────────
service:
  type: ClusterIP
  port: 443

nodeSelector: {}
tolerations: []
affinity: {}

# ── GUI Configuration (EmberNET Store Labels) ────────────────────────
gui:
  enabled: true
  port: 443
  type: "web"
  displayName: "SORBA Cloud — IoT Unified Platform"

# ── SORBA Platform Connection ─────────────────────────────────────────
# These configure the bridge to proxy traffic to the upstream SORBA
# Cloud platform services deployed in the same namespace.
sorba:
  # Domain and tenant must match the upstream SORBA deployment
  domain: ""              # e.g., "example.com"
  tenant: ""              # e.g., "sorba-demo"
  # Internal service name of the upstream SORBA platform entry point.
  # The bridge's nginx config proxies to this service.
  # Adjust if the upstream release creates a differently-named service.
  platformService: "platform"
  platformPort: 443

# ── Network ───────────────────────────────────────────────────────────
network:
  hostNetwork: false
  extraPorts: []

# ── Security Context ──────────────────────────────────────────────────
securityContext:
  runAsRoot: false
  runAsUser: 65534
  allowPrivilegeEscalation: false
  capabilities: {}

serviceAccount: {}
env: []
envFrom: []
config: {}

# ═══════════════════════════════════════════════════════════════════════
# REFERENCE: Upstream SORBA Cloud values.yaml
# ═══════════════════════════════════════════════════════════════════════
# Create a SEPARATE values-sorba.yaml for the upstream deployment:
#
# global:
#   domain: "<your_domain.com>"
#   tenant: "<your_tenant>"
#   version: "1.3.0"
#   credentials:
#     enabled: true
#     registry: sorbaregistry.azurecr.io
#     username: <USERNAME>
#     password: <TOKEN>
#   acmedns:
#     enabled: true
#   secrets:
#     mysql:
#       MYSQL_PASSWORD: "<secure>"
#     influx:
#       INFLUX_PASSWORD: "<secure>"
#     grafana:
#       GRAFANA_PASSWORD: "<secure>"
#     mqtt:
#       MQTT_PASSWORD: "<secure>"
#
# Deploy with:
#   helm registry login sorbaregistry.azurecr.io -u <USERNAME> -p <TOKEN>
#   export TENANT=<your_tenant>
#   helm -n $TENANT upgrade $TENANT \
#     oci://sorbaregistry.azurecr.io/helm/sorba-cloud --version=1.3.0 \
#     -i --create-namespace -f values-sorba.yaml
# ═══════════════════════════════════════════════════════════════════════
