# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud — EmberNET App Store Values
# ═══════════════════════════════════════════════════════════════════════
# Translated from the SORBA Cloud Helm Chart Deployment Guide for AKS.
# Adapted to the EmberNET helm-chart-temps template structure.
#
# This chart deploys the SORBA Cloud IoT platform into the EmberNET
# ecosystem. The upstream chart is pulled from the SORBA OCI registry
# (sorbaregistry.azurecr.io), but this wrapper chart provides the
# EmberNET store labels, proxy integration, and credential handling
# required by the dashboard pipeline.
# ═══════════════════════════════════════════════════════════════════════

# ── Image Configuration ──────────────────────────────────────────────
# SORBA Cloud pulls its images from sorbaregistry.azurecr.io.
# The imagePullSecrets reference is for the SORBA private registry,
# NOT the EmberNET ghcr-secret (though ghcr-secret is also included
# for any EmberNET sidecar images).
image:
  repository: sorbaregistry.azurecr.io/sorba-cloud
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: sorba-registry-secret
  - name: ghcr-secret

# ── Replica and Resource Configuration ────────────────────────────────
# SORBA Cloud is a heavyweight platform with MySQL, InfluxDB, Redis,
# Grafana, MQTT broker, and multiple microservices. Resource requests
# reflect the minimum viable deployment. Tune per environment.
replicaCount: 1

resources:
  requests:
    cpu: 2000m
    memory: 4096Mi
  limits:
    cpu: 8000m
    memory: 16384Mi

# ── Service Configuration ────────────────────────────────────────────
# The primary web UI entry point is the IoT Unified Platform.
# This port maps to the platform web interface for iframe embedding.
service:
  type: ClusterIP
  port: 443

# ── Node Selector ─────────────────────────────────────────────────────
# Injected by DeployApp() at deploy time — pins the workload to the
# selected node. DO NOT hardcode.
nodeSelector: {}

# ── Tolerations ───────────────────────────────────────────────────────
tolerations: []

# ── Affinity ──────────────────────────────────────────────────────────
affinity: {}

# ── GUI Configuration (EmberNET Store Integration) ────────────────────
# The SORBA platform GUI is the IoT Unified Platform, accessible via
# HTTPS. The dashboard proxy strips X-Frame-Options so it can iframe.
gui:
  enabled: true
  port: 443
  type: "web"
  displayName: "SORBA Cloud — IoT Unified Platform"

# ── SORBA Global Configuration ────────────────────────────────────────
# Maps to the upstream SORBA Cloud values.yaml global section.
# See: SORBA-helm-chart-deployment-guide.md, Step 5
global:
  # Your domain — all services are exposed as {app}.{tenant}.{domain}
  domain: ""
  # Tenant identifier (lowercase, no spaces) — used as K8s namespace
  # and in application URLs
  tenant: ""
  # SORBA platform version — matches the OCI chart version
  version: "1.3.0"
  # ── SORBA Container Registry Credentials ──────────────────────────
  # These credentials are provided by SORBA for pulling images and
  # charts from sorbaregistry.azurecr.io.
  # Use existingSecret (recommended) to reference a pre-created K8s
  # secret, or provide username/password inline (dev only).
  #
  # To create the secret:
  #   kubectl create secret docker-registry sorba-registry-secret \
  #     --docker-server=sorbaregistry.azurecr.io \
  #     --docker-username=<USERNAME> \
  #     --docker-password=<TOKEN> \
  #     -n <namespace>
  credentials:
    enabled: true
    registry: sorbaregistry.azurecr.io
    # Inline credentials (dev/test only — use existingSecret in prod)
    username: ""
    password: ""
    # Use an existing K8s docker-registry secret instead of inline creds
    existingSecret: "sorba-registry-secret"
  config:
    environment: ""
  # ── ACME DNS for SSL Certificates ──────────────────────────────────
  # cert-manager + ACME DNS-01 challenge for automatic SSL issuance.
  # Requires a CNAME DNS record:
  #   _acme-challenge.{tenant}.{domain} → daed2c11-cadc-43cc-8564-53174c6ab6f6.auth.acme-dns.io
  acmedns:
    enabled: true
    certManagerNamespace: "cert-manager"

# ── SORBA Service Secrets ─────────────────────────────────────────────
# Database and service passwords for the SORBA stack components.
# Use existingSecret references where possible (recommended for prod).
# If existingSecret is empty, the chart creates secrets from inline values.
secrets:
  mysql:
    password: ""
    existingSecret: "sorba-mysql-credentials"
    existingSecretKey: "MYSQL_PASSWORD"
  influx:
    password: ""
    existingSecret: "sorba-influx-credentials"
    existingSecretKey: "INFLUX_PASSWORD"
  grafana:
    password: ""
    existingSecret: "sorba-grafana-credentials"
    existingSecretKey: "GRAFANA_PASSWORD"
  mqtt:
    password: ""
    existingSecret: "sorba-mqtt-credentials"
    existingSecretKey: "MQTT_PASSWORD"

# ── Persistence ───────────────────────────────────────────────────────
# SORBA Cloud components (MySQL, InfluxDB, Redis, Grafana) all need
# persistent volumes. This top-level persistence controls the
# platform-level PVC. Individual component PVCs are managed by the
# upstream SORBA chart.
persistence:
  enabled: true
  size: 50Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# ── Network Configuration ─────────────────────────────────────────────
# SORBA Cloud uses ingress-nginx for external access. When deployed
# in the EmberNET ecosystem, hostNetwork allows direct plant-floor
# communication for MQTT and data collection.
network:
  hostNetwork: true
  extraPorts:
    - name: mqtt-tls
      containerPort: 8883
      protocol: TCP
    - name: vpn
      containerPort: 1194
      protocol: TCP

# ── Security Context ──────────────────────────────────────────────────
# SORBA Cloud services require root for binding to privileged ports
# (443, 8883) and managing VPN tunnels.
securityContext:
  runAsRoot: true
  runAsUser: 0
  allowPrivilegeEscalation: false
  capabilities:
    add:
      - NET_ADMIN
      - NET_BIND_SERVICE

# ── Service Account ───────────────────────────────────────────────────
serviceAccount: {}

# ── Environment Variables ─────────────────────────────────────────────
env: []

envFrom: []
  # Injected by the deployment template when secrets.*.existingSecret
  # is configured:
  # - secretRef:
  #     name: sorba-mysql-credentials
  #     optional: true

# ── SORBA Component Resource Overrides ────────────────────────────────
# Override resource requests/limits for individual SORBA services.
# Maps directly to the upstream SORBA chart's customization section.
influxdb:
  resources:
    limits:
      cpu: 1500m
      memory: 1024Mi
    requests:
      cpu: 1000m
      memory: 1024Mi

mysql-sorba:
  primary:
    resources:
      limits:
        cpu: 1000m
        memory: 2048Mi
      requests:
        cpu: 500m
        memory: 1024Mi

redis:
  master:
    resources:
      limits:
        cpu: 2000m
        memory: 2048Mi
      requests:
        cpu: 500m
        memory: 512Mi

# ── SORBA Application Endpoints ──────────────────────────────────────
# Reference: these are the SORBA Cloud services exposed via ingress.
# The dashboard can iframe the platform endpoint directly.
#
# Web Applications (https://{app}.{tenant}.{domain}):
#   platform  — IoT Unified Platform (primary web UI)
#   dashboard — Grafana Dashboard
#   ml-ui     — AI Trainer
#   identity  — Identity Management
#   taskflows — Task Flow Engine
#   vpn       — SORBA VPN
#   workflow  — NodeRed Workflow Engine
#   gateway   — API Gateway
#   influx    — InfluxDB API
#
# TCP Services:
#   broker.{tenant}.{domain}:8883 — MQTT over TLS
#   vpn.{tenant}.{domain}:1194   — VPN Tunnel

# ── App-Specific Configuration ────────────────────────────────────────
config: {}
