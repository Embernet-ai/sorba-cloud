apiVersion: v2
name: sorba-cloud
description: "EmberNET App Store bridge for SORBA Cloud IoT Platform — provides dashboard visibility for the upstream SORBA Cloud deployment"
type: application
version: 1.3.0
appVersion: "1.3.0"

# ═══════════════════════════════════════════════════════════════════════
# ARCHITECTURE NOTE
# ═══════════════════════════════════════════════════════════════════════
# This is the EmberNET bridge chart. It does NOT contain the upstream
# SORBA Cloud platform as a subchart dependency because the upstream
# chart requires SORBA registry credentials to pull:
#   oci://sorbaregistry.azurecr.io/helm/sorba-cloud
#
# Deployment is a TWO-STEP process:
#
# Step 1: Deploy SORBA Cloud from their OCI registry (requires SORBA creds):
#   helm registry login sorbaregistry.azurecr.io -u <USERNAME> -p <TOKEN>
#   helm -n $TENANT upgrade $TENANT oci://sorbaregistry.azurecr.io/helm/sorba-cloud \
#     --version=1.3.0 -i --create-namespace -f values-sorba.yaml
#
# Step 2: Deploy this bridge chart (adds EmberNET store labels):
#   helm install sorba-cloud-bridge charts/sorba-cloud -n $TENANT
#
# The bridge provides a labeled pod + service that the EmberNET dashboard
# can discover and iframe. The upstream SORBA chart handles everything else.
# ═══════════════════════════════════════════════════════════════════════

icon: https://raw.githubusercontent.com/embernet-ai/sorba-cloud/main/icon.png

annotations:
  catalog.cattle.io/display-name: "SORBA Cloud IoT Platform"
  catalog.cattle.io/namespace: default
  catalog.cattle.io/certified: partner
  catalog.cattle.io/os: linux
  catalog.cattle.io/supported-architectures: amd64,arm64
  catalog.cattle.io/requests-cpu: "8000m"
  catalog.cattle.io/requests-memory: "16Gi"

keywords:
  - embernet
  - industrial
  - iot
  - sorba
  - mqtt
  - grafana
  - influxdb
  - machine-learning
  - edge-analytics
  - scada
  - plc
  - data-collection

home: https://github.com/embernet-ai/sorba-cloud
sources:
  - https://github.com/embernet-ai/sorba-cloud

maintainers:
  - name: Patrick Ryan
    email: patrick@fireballz.ai
  - name: Embernet Team
    email: helpdesk@fireballz.ai
