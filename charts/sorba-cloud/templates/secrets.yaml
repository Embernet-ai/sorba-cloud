# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud — Registry Credentials Secret
# ═══════════════════════════════════════════════════════════════════════
# Creates a docker-registry secret for pulling images from the SORBA
# private container registry (sorbaregistry.azurecr.io).
#
# This is only created when:
#   1. global.credentials.enabled is true
#   2. global.credentials.existingSecret is empty
#   3. global.credentials.username and password are provided
#
# In production, use existingSecret instead — create the secret manually:
#   kubectl create secret docker-registry sorba-registry-secret \
#     --docker-server=sorbaregistry.azurecr.io \
#     --docker-username=<USERNAME> \
#     --docker-password=<TOKEN> \
#     -n <namespace>
# ═══════════════════════════════════════════════════════════════════════
{{- if and .Values.global.credentials.enabled (not .Values.global.credentials.existingSecret) .Values.global.credentials.username .Values.global.credentials.password }}
apiVersion: v1
kind: Secret
metadata:
  name: sorba-registry-secret
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "sorba-cloud.registrySecret" . }}
{{- end }}
---
# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud — Service Credentials Secrets
# ═══════════════════════════════════════════════════════════════════════
# Creates K8s secrets for MySQL, InfluxDB, Grafana, and MQTT passwords
# when inline values are provided and existingSecret is not set.
# ═══════════════════════════════════════════════════════════════════════
{{- if and .Values.secrets.mysql.password (not .Values.secrets.mysql.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: sorba-mysql-credentials
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
type: Opaque
data:
  MYSQL_PASSWORD: {{ .Values.secrets.mysql.password | b64enc }}
{{- end }}
---
{{- if and .Values.secrets.influx.password (not .Values.secrets.influx.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: sorba-influx-credentials
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
type: Opaque
data:
  INFLUX_PASSWORD: {{ .Values.secrets.influx.password | b64enc }}
{{- end }}
---
{{- if and .Values.secrets.grafana.password (not .Values.secrets.grafana.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: sorba-grafana-credentials
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
type: Opaque
data:
  GRAFANA_PASSWORD: {{ .Values.secrets.grafana.password | b64enc }}
{{- end }}
---
{{- if and .Values.secrets.mqtt.password (not .Values.secrets.mqtt.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: sorba-mqtt-credentials
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
type: Opaque
data:
  MQTT_PASSWORD: {{ .Values.secrets.mqtt.password | b64enc }}
{{- end }}
