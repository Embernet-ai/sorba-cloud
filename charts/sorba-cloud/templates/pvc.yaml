# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud — PersistentVolumeClaim Template
# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud needs persistent storage for MySQL, InfluxDB, Redis,
# and Grafana data. This PVC handles the platform-level data volume.
# Individual component PVCs are managed by the upstream SORBA chart.
# ═══════════════════════════════════════════════════════════════════════
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sorba-cloud.fullname" . }}-data
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode | default "ReadWriteOnce" }}
  {{- if .Values.persistence.storageClass }}
  {{- if (eq "-" .Values.persistence.storageClass) }}
  storageClassName: ""
  {{- else }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | default "50Gi" }}
{{- end }}
