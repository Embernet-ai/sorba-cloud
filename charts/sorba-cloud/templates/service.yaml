# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud — EmberNET Bridge Service
# ═══════════════════════════════════════════════════════════════════════
# This service is what the EmberNET dashboard proxy targets for iframe
# embedding. It routes to the bridge pod, which forwards to the
# upstream SORBA Cloud platform.
#
# CRITICAL: The Service MUST carry embernet.ai/store-app and the
# other store labels for the Running Apps panel.
# ═══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
    # ═══════════════════════════════════════════════════════════════
    # EmberNET Store Labels on the SERVICE
    # Required for /api/apps/services (Running Apps panel)
    # ═══════════════════════════════════════════════════════════════
    {{- include "sorba-cloud.storeLabels" . | nindent 4 }}
  {{- if .Values.gui.displayName }}
  annotations:
    embernet.ai/display-name: {{ .Values.gui.displayName | quote }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "sorba-cloud.selectorLabels" . | nindent 4 }}
