# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud — Bridge ConfigMap
# ═══════════════════════════════════════════════════════════════════════
# Nginx reverse proxy config that bridges the EmberNET dashboard iframe
# to the upstream SORBA Cloud platform service.
# ═══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sorba-cloud.fullname" . }}-bridge-config
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        # Health check for K8s probes
        location /healthz {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Proxy to the upstream SORBA platform service
        location / {
            resolver kube-dns.kube-system.svc.cluster.local valid=5s;
            set $upstream "{{ .Values.sorba.platformService }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.sorba.platformPort }}";
            proxy_pass https://$upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;

            # WebSocket support (NodeRed, Grafana live)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
