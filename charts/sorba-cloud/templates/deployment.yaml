# ═══════════════════════════════════════════════════════════════════════
# SORBA Cloud — EmberNET Label Bridge Deployment
# ═══════════════════════════════════════════════════════════════════════
# This is NOT the main SORBA Cloud deployment — that's handled by the
# upstream subchart dependency (oci://sorbaregistry.azurecr.io/helm/sorba-cloud).
#
# This deployment exists ONLY to provide EmberNET App Store labels so
# the dashboard can discover the SORBA Cloud deployment and enable the
# "Open" iframe button. It runs a minimal busybox sidecar that:
#   1. Carries the Big Four embernet.ai/* labels
#   2. Provides a health endpoint for the dashboard proxy
#   3. Redirects to the actual SORBA platform service
#
# The upstream SORBA chart deploys MySQL, InfluxDB, Redis, Grafana,
# MQTT, NodeRed, AI Trainer, Identity, VPN, API Gateway, etc.
# This pod just makes all of that visible to EmberNET.
# ═══════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sorba-cloud.fullname" . }}-bridge
  labels:
    {{- include "sorba-cloud.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sorba-cloud.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sorba-cloud.selectorLabels" . | nindent 8 }}
        # ═══════════════════════════════════════════════════════════
        # CRITICAL: EmberNET Store Labels — THE BIG FOUR
        # These labels are how the dashboard discovers the SORBA
        # Cloud deployment and enables the "Open" iframe button.
        # ═══════════════════════════════════════════════════════════
        {{- include "sorba-cloud.storeLabels" . | nindent 8 }}
      {{- if .Values.gui.displayName }}
      annotations:
        embernet.ai/display-name: {{ .Values.gui.displayName | quote }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # Lightweight nginx reverse proxy that forwards traffic to the
        # upstream SORBA platform service. This is what the EmberNET
        # dashboard iframe connects to.
        - name: bridge
          image: "nginx:alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "sorba-cloud.fullname" . }}-bridge-config
